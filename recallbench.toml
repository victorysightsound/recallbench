[defaults]
concurrency = 10
token_budget = 32768
gen_model = "claude-sonnet"
judge_model = "claude-sonnet"
output_dir = "results"
quick_size = 50

[llm.anthropic]
mode = "cli"
rate_limit_rpm = 60

# DeepInfra GPT-OSS-120B — use with --gen-model deepinfra
[llm.deepinfra]
base_url = "https://api.deepinfra.com/v1/openai"
api_key_cmd = "security find-generic-password -w -s 'DeepInfra API Key' -a 'deepinfra'"
model = "openai/gpt-oss-120b"
rate_limit_rpm = 120
rate_limit_tpm = 0
